<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SaaS ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-cover bg-center bg-no-repeat min-h-screen flex flex-col font-sans"
      style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070&auto=format&fit=crop');">

    <header class="w-full flex items-center justify-between px-8 py-6 text-gray-900 bg-white/20 backdrop-blur-sm border-b border-white/30">
        
        <div class="text-xl font-bold tracking-wider uppercase w-1/3">
            SaaS ERP
        </div>

        <div class="hidden md:flex justify-center items-center w-1/3">
            <svg class="w-12 h-12 text-blue-700" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2L2 22h20L12 2zm0 3.83L19.17 20H4.83L12 5.83z"/>
            </svg>
        </div>

        <nav class="hidden md:flex items-center justify-end space-x-6 text-sm font-bold tracking-wide w-1/3">
            <a href="#" class="hover:text-blue-700 transition">HOME</a>
            <a href="#" class="hover:text-blue-700 transition">ABOUT US</a>
            <a href="#" class="hover:text-blue-700 transition">CONTACT</a>
            <a href="{% url 'login' %}" class="hover:text-blue-700 transition">LOG IN</a>
            <a href="{% url 'register_tenant' %}" class="border-b-2 border-blue-700 text-blue-700 pb-1">SIGN UP</a>
        </nav>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        
        <div class="bg-white/40 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-full max-w-lg border border-white/50">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-gray-900">Sign Up</h1>
                <p class="text-gray-800 mt-2 font-medium">Configura tu entorno de trabajo</p>
            </div>

            {% if error %}
            <div class="bg-red-500/90 text-white text-sm font-medium p-3 rounded-full mb-4 text-center shadow-md">
                {{ error }}
            </div>
            {% endif %}

            <form action="{% url 'register_tenant' %}" method="POST" class="space-y-4">
                {% csrf_token %}

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="text" name="first_name" class="w-full px-6 py-3 rounded-full bg-white/90 border-0 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-sm placeholder-gray-500 font-medium" placeholder="First Name" required>
                    <input type="text" name="last_name" class="w-full px-6 py-3 rounded-full bg-white/90 border-0 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-sm placeholder-gray-500 font-medium" placeholder="Last Name" required>
                </div>

                <input type="email" name="email" class="w-full px-6 py-3 rounded-full bg-white/90 border-0 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-sm placeholder-gray-500 font-medium" placeholder="Email Address" required>

                <input type="password" name="password" class="w-full px-6 py-3 rounded-full bg-white/90 border-0 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-sm placeholder-gray-500 font-medium" placeholder="Password" required>

                <input type="text" name="company_name" class="w-full px-6 py-3 rounded-full bg-white/90 border-0 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-sm placeholder-gray-500 font-medium" placeholder="Company Name" required>

                <select name="business_type" class="w-full px-6 py-3 rounded-full bg-white/90 border-0 focus:outline-none focus:ring-4 focus:ring-blue-500/50 shadow-sm text-gray-600 font-medium appearance-none cursor-pointer" required>
                    <option value="" disabled selected>Select Business Type...</option>
                    <option value="retail">Retail & Inventory</option>
                    <option value="gym">Gym / Fitness Center</option>
                    <option value="barbershop">Barbershop / Salon</option>
                </select>

                <div class="pt-4">
                    <button type="submit" class="w-full text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-bold rounded-full text-lg px-5 py-4 text-center transition-all shadow-lg transform hover:scale-[1.02]">
                        Create Account
                    </button>
                </div>

                <div class="text-center mt-4 text-sm font-bold text-gray-900">
                    or <a href="{% url 'login' %}" class="text-blue-800 hover:underline">Log in</a>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
